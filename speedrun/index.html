<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speedrun</title>
  <meta name="description" content="Weekly 2D platformer speedrun challenge. Race to the finish, collect coins, beat your time.">
  <link rel="stylesheet" href="../games/speedrun/style.css">
</head>
<body>
  <h1>Speedrun</h1>
  <button id="lb-open" class="lb-open-btn">Leaderboard</button>
  <canvas id="game-canvas"></canvas>
  <div id="results-overlay" class="hidden">
    <div id="results-content"></div>
  </div>
  <div id="leaderboard-modal" class="hidden">
    <div class="lb-content">
      <div class="lb-header">
        <h2>Leaderboard</h2>
        <button id="lb-close" class="lb-close">&times;</button>
      </div>
      <div class="lb-tabs">
        <button class="lb-tab lb-tab-active" data-category="anyPercent">Any%</button>
        <button class="lb-tab" data-category="hundredRed">100% Red</button>
        <button class="lb-tab" data-category="hundredBlue">100% Blue</button>
      </div>
      <div id="lb-body" class="lb-body"></div>
    </div>
  </div>
  <script type="module" src="../games/speedrun/src/main.js"></script>
</body>
</html>
