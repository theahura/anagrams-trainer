<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Games</title>
  <meta name="description" content="A small collection of browser games.">
  <meta property="og:title" content="Games">
  <meta property="og:description" content="A small collection of browser games.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">

  <link rel="stylesheet" crossorigin href="./assets/index-CK3DF8C8.css">

<body>
  <main class="games-index">
    <p class="eyebrow">Game collection</p>
    <h1>Games</h1>
    <p class="intro">
      A small index of browser games published from this repository.
    </p>

    <section class="games-list" aria-label="Games">
      <a class="game-card" href="./reword/">
        <img class="game-card-image" src="./assets/og-image-B0sBEiOE.png" alt="Reword – a daily anagram puzzle">
        <div class="game-card-body">
          <span class="game-name">Reword</span>
          <span class="game-description">Daily anagram game where you add letters to a root word and rearrange them into something new.</span>
        </div>
      </a>
      <a class="game-card" href="./speedrun/">
        <img class="game-card-image" src="./assets/og-image-_IR4l4zj.png" alt="Speedrun – a daily platformer challenge">
        <div class="game-card-body">
          <span class="game-name">Speedrun</span>
          <span class="game-description">Daily 2D platformer challenge. Race to the finish, collect coins, beat your personal best.</span>
        </div>
      </a>
    </section>
  </main>
