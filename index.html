<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Games</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="games-index">
    <p class="eyebrow">Game collection</p>
    <h1>Games</h1>
    <p class="intro">
      A small index of browser games published from this repository.
    </p>

    <section class="games-list" aria-label="Games">
      <a class="game-card" href="./reword/">
        <span class="game-name">Reword</span>
        <span class="game-description">Daily anagram game where you add letters to a root word and rearrange them into something new.</span>
      </a>
    </section>
  </main>
</body>
</html>
