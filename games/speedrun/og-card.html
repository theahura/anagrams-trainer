<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speedrun — OG Card</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #121213;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }

    .card {
      width: 1200px;
      height: 630px;
      background: #121213;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding-bottom: 40px;
    }

    .title {
      font-weight: 800;
      font-size: 88px;
      color: #d7dadc;
      letter-spacing: 6px;
      text-transform: uppercase;
    }

    .timer {
      font-family: 'Courier New', monospace;
      font-size: 88px;
      font-weight: 700;
      color: #538d4e;
      letter-spacing: 4px;
    }

    .subtitle {
      color: #6a6a6d;
      font-size: 24px;
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">Speedrun</div>
    <div class="timer">00:12.34</div>
    <div class="subtitle">a daily platformer challenge</div>
  </div>
</body>
</html>
